name: Bug report
description: Report a reproducible problem in Suwol Visual Reference.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not upload private libraries, copyrighted assets, tokens, keys, or personal files.
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Example: v0.1.1
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows x64
        - Linux x64
        - Other
    validations:
      required: true
  - type: dropdown
    id: package-type
    attributes:
      label: Distribution package
      options:
        - Windows ZIP
        - Linux ZIP
        - Development build
        - Other
    validations:
      required: true
  - type: textarea
    id: situation
    attributes:
      label: Situation
      description: What were you doing when the issue happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open...
        2. Import...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: Remove private or copyrighted content before attaching images.
  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      description: Paste only relevant messages. Remove personal paths, tokens, and private data.
  - type: input
    id: library-size
    attributes:
      label: Library size
      description: Approximate asset count, if relevant.
  - type: input
    id: import-types
    attributes:
      label: Imported file types
      description: Example: PNG, JPG, WebP, SVG.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not attach private assets, copyrighted source files, credentials, keys, or tokens.
          required: true
