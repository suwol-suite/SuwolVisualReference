name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the workflow rather than attaching private reference assets.
  - type: textarea
    id: feature
    attributes:
      label: Desired feature
      description: What should Suwol Visual Reference do?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Use case
      description: What workflow or problem would this improve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: How do you handle this today?
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Blocking a workflow
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related workflows
      description: Import, tagging, collections, smart folders, duplicates, export, viewer, release, or another area.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not attach private assets, copyrighted source files, credentials, keys, or tokens.
          required: true
