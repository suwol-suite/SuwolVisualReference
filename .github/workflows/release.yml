name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to publish, for example v0.1.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm.cmd -v

      - name: Install dependencies
        run: npm.cmd ci

      - name: Rebuild native dependencies
        run: npm.cmd run rebuild:native

      - name: Validate
        run: |
          npm.cmd run icons:generate
          npm.cmd run typecheck
          npm.cmd run lint
          npm.cmd run test:selection
          npm.cmd run i18n:check
          npm.cmd run license:check
          npm.cmd run smoke

      - name: Build release ZIP
        run: npm.cmd run release:zip:win

      - name: Verify packaged app
        run: npm.cmd run verify:packaged-app -- --platform=win

      - name: List release files
        run: Get-ChildItem -Path release -Recurse | Select-Object FullName, Length

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: release/SuwolVisualReference-*-win-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install Electron smoke-test display helper
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npm run rebuild:native

      - name: Validate
        run: |
          npm run icons:generate
          npm run typecheck
          npm run lint
          npm run test:selection
          npm run i18n:check
          npm run license:check
          xvfb-run -a npm run smoke:ci:linux

      - name: Build release ZIP
        run: npm run release:zip:linux

      - name: Verify packaged app
        run: npm run verify:packaged-app -- --platform=linux

      - name: List release files
        run: find release -maxdepth 2 -type f -print

      - name: Upload Linux ZIP
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: release/SuwolVisualReference-*-linux-x64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install verification dependencies
        run: npm ci --ignore-scripts

      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-assets

      - name: Download Linux ZIP
        uses: actions/download-artifact@v4
        with:
          name: linux-zip
          path: release-assets

      - name: Verify version and create checksums
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}"
          find release-assets -maxdepth 1 -type f -print
          node scripts/checksums.mjs release-assets
          node scripts/verify-checksums.mjs release-assets --require-all
          node scripts/verify-release-zip.mjs release-assets --require-all
          cat "release-assets/SuwolVisualReference-${VERSION}-checksums.txt"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/release-notes/${RELEASE_TAG}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            NOTES_FILE=".github/release-template.md"
          fi
          gh release create "$RELEASE_TAG" \
            "release-assets/SuwolVisualReference-${VERSION}-win-x64.zip" \
            "release-assets/SuwolVisualReference-${VERSION}-linux-x64.zip" \
            "release-assets/SuwolVisualReference-${VERSION}-checksums.txt" \
            --verify-tag \
            --title "Suwol Visual Reference ${RELEASE_TAG}" \
            --notes-file "$NOTES_FILE"
