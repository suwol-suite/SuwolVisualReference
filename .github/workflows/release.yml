name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm.cmd -v

      - name: Install dependencies
        run: npm.cmd ci

      - name: Rebuild native dependencies
        run: npm.cmd run rebuild:native

      - name: Validate
        run: |
          npm.cmd run icons:generate
          npm.cmd run typecheck
          npm.cmd run lint
          npm.cmd run i18n:check
          npm.cmd run license:check
          npm.cmd run smoke

      - name: Build release ZIP
        run: npm.cmd run release:zip:win

      - name: List release files
        run: Get-ChildItem -Path release -Recurse | Select-Object FullName, Length

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: release/SuwolVisualReference-*-win-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install Electron smoke-test display helper
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npm run rebuild:native

      - name: Validate
        run: |
          npm run icons:generate
          npm run typecheck
          npm run lint
          npm run i18n:check
          npm run license:check
          npm run build
          xvfb-run -a ./node_modules/.bin/electron --no-sandbox out/main/index.js --smoke-test

      - name: Build release ZIP
        run: npm run release:zip:linux

      - name: List release files
        run: find release -maxdepth 2 -type f -print

      - name: Upload Linux ZIP
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: release/SuwolVisualReference-*-linux-x64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-assets

      - name: Download Linux ZIP
        uses: actions/download-artifact@v4
        with:
          name: linux-zip
          path: release-assets

      - name: Verify version and create checksums
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          find release-assets -maxdepth 1 -type f -print
          node scripts/checksums.mjs release-assets
          cat "release-assets/SuwolVisualReference-${VERSION}-checksums.txt"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            NOTES_FILE=".github/release-template.md"
          fi
          gh release create "$GITHUB_REF_NAME" \
            "release-assets/SuwolVisualReference-${VERSION}-win-x64.zip" \
            "release-assets/SuwolVisualReference-${VERSION}-linux-x64.zip" \
            "release-assets/SuwolVisualReference-${VERSION}-checksums.txt" \
            --verify-tag \
            --title "Suwol Visual Reference ${GITHUB_REF_NAME}" \
            --notes-file "$NOTES_FILE"
