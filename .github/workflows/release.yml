name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v0.2.5'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Read release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$RELEASE_TAG" ]; then
            echo "release_tag is required"
            exit 1
          fi
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "release_tag must be a version tag like v0.2.5"
              exit 1
              ;;
          esac
          VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          {
            echo "release_tag=$RELEASE_TAG"
            echo "version=$VERSION"
            echo "release_name=Suwol Visual Reference $VERSION"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows ZIP
    needs: prepare
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm.cmd -v

      - name: Install dependencies
        run: npm.cmd ci

      - name: Rebuild native dependencies
        run: npm.cmd run rebuild:native

      - name: Validate
        run: |
          npm.cmd run icons:generate
          npm.cmd run typecheck
          npm.cmd run lint
          npm.cmd run test:selection
          npm.cmd run test:updates
          npm.cmd run i18n:check
          npm.cmd run license:check
          npm.cmd run smoke

      - name: Build release ZIP
        run: npm.cmd run release:zip:win

      - name: Verify packaged app
        run: npm.cmd run verify:packaged-app -- --platform=win

      - name: Verify Windows ZIP
        run: npm.cmd run verify:release:zip -- --platform=win

      - name: Collect Windows artifact
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Get-ChildItem -Path release -Recurse -File | Select-Object FullName, Length
          $zip = Get-ChildItem -Path release -Recurse -File -Filter 'SuwolVisualReference-*-win-x64.zip' | Select-Object -First 1
          if (-not $zip) {
            throw 'Windows ZIP artifact not found.'
          }
          Copy-Item -LiteralPath $zip.FullName -Destination "release-artifacts/SuwolVisualReference-${{ needs.prepare.outputs.version }}-win-x64.zip"

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts/*
          if-no-files-found: error

  build-linux:
    name: Build Linux Artifacts
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install Electron smoke-test display helper
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npm run rebuild:native

      - name: Validate
        run: |
          npm run icons:generate
          npm run typecheck
          npm run lint
          npm run test:selection
          npm run test:updates
          npm run i18n:check
          npm run license:check
          xvfb-run -a npm run smoke:ci:linux

      - name: Build Linux release artifacts
        run: npm run dist:linux:release

      - name: Normalize Linux AppImage metadata
        run: npm run release:normalize-linux-appimage -- --require

      - name: Verify packaged app
        run: npm run verify:packaged-app -- --platform=linux

      - name: Verify Linux ZIP
        run: npm run verify:release:zip -- --platform=linux

      - name: Collect Linux artifacts
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          echo "Linux release files:"
          find release -maxdepth 6 -type f -print | sort
          LINUX_ZIP="$(find release -type f -name 'SuwolVisualReference-*-linux-x64.zip' | head -n 1)"
          LINUX_APPIMAGE="$(find release -type f -name 'SuwolVisualReference-*-linux-x64.AppImage' | head -n 1)"
          LINUX_LATEST="$(find release -type f -name 'latest-linux.yml' | head -n 1)"
          if [ -z "$LINUX_ZIP" ]; then
            echo "Linux ZIP artifact not found."
            find release -maxdepth 6 -type f -print | sort
            exit 1
          fi
          if [ -z "$LINUX_APPIMAGE" ]; then
            echo "Linux AppImage artifact not found."
            find release -maxdepth 6 -type f -print | sort
            exit 1
          fi
          if [ -z "$LINUX_LATEST" ]; then
            echo "latest-linux.yml not found."
            find release -maxdepth 6 -type f -print | sort
            exit 1
          fi
          cp "$LINUX_ZIP" "release-artifacts/SuwolVisualReference-${VERSION}-linux-x64.zip"
          cp "$LINUX_APPIMAGE" "release-artifacts/SuwolVisualReference-${VERSION}-linux-x64.AppImage"
          cp "$LINUX_LATEST" "release-artifacts/latest-linux.yml"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: release-artifacts/*
          if-no-files-found: error

  build-macos:
    name: Build macOS ARM64 Artifacts
    needs: prepare
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 120
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      NOTARYTOOL_PROFILE: suwol-notary-profile
      NOTARY_TIMEOUT_MINUTES: 120
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Unlock macOS keychain
        shell: bash
        env:
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MAC_KEYCHAIN_PASSWORD:-}" ]; then
            echo "MAC_KEYCHAIN_PASSWORD secret is missing."
            exit 1
          fi
          LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"
          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$LOGIN_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$LOGIN_KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MAC_KEYCHAIN_PASSWORD" "$LOGIN_KEYCHAIN"
          security default-keychain -s "$LOGIN_KEYCHAIN"
          security list-keychains -d user -s "$LOGIN_KEYCHAIN"

      - name: Verify signing inputs
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_TEAM_ID NOTARYTOOL_PROFILE; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required signing inputs: %s\n' "${missing[*]}"
            exit 1
          fi
          xcodebuild -version
          xcrun -find notarytool
          xcrun -find stapler
          xcrun notarytool --version
          security find-identity -v -p codesigning
          security find-identity -v -p codesigning | grep "Developer ID Application" || (
            echo "Developer ID Application identity not found" && exit 1
          )
          NOTARY_HISTORY="$(xcrun notarytool history --keychain-profile "$NOTARYTOOL_PROFILE")"
          printf '%s\n' "$NOTARY_HISTORY" | head -n 20
          xcrun notarytool history --keychain-profile "$NOTARYTOOL_PROFILE" --output-format json >/dev/null

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npm run rebuild:native

      - name: Validate source
        run: |
          npm run icons:generate
          npm run icons:check
          npm run typecheck
          npm run lint
          npm run test:selection
          npm run test:updates
          npm run i18n:check
          npm run license:check
          npm run build

      - name: Build macOS ARM64 artifacts
        run: npm run dist:mac:arm64

      - name: Re-sign native payloads if needed
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find release -maxdepth 2 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found."
            exit 1
          fi
          npm run mac:resign-app -- "$APP_PATH"

      - name: Verify app signatures
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find release -maxdepth 2 -name '*.app' -type d | head -n 1)"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          while IFS= read -r native_file; do
            codesign --verify --strict --verbose=2 "$native_file"
          done < <(find "$APP_PATH" -type f \( -name '*.node' -o -name '*.dylib' \))

      - name: Notarize and staple DMG
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="$(find release -maxdepth 1 -name '*.dmg' -type f | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "No macOS DMG found."
            exit 1
          fi
          npm run mac:notarize-dmg -- "$DMG_PATH"

      - name: Collect macOS artifacts
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          echo "macOS release files:"
          find release -maxdepth 6 -type f -print | sort
          MAC_DMG="$(find release -type f -name '*.dmg' | head -n 1)"
          MAC_ZIP="$(find release -type f -name '*.zip' | head -n 1)"
          MAC_LATEST="$(find release -type f -name 'latest-mac.yml' | head -n 1)"
          if [ -z "$MAC_DMG" ]; then
            echo "macOS DMG artifact not found."
            find release -maxdepth 6 -type f -print | sort
            exit 1
          fi
          if [ -z "$MAC_ZIP" ]; then
            echo "macOS ZIP artifact not found."
            find release -maxdepth 6 -type f -print | sort
            exit 1
          fi
          if [ -z "$MAC_LATEST" ]; then
            echo "latest-mac.yml not found."
            find release -maxdepth 6 -type f -print | sort
            exit 1
          fi
          cp "$MAC_DMG" "release-artifacts/SuwolVisualReference-${VERSION}-mac-arm64.dmg"
          cp "$MAC_ZIP" "release-artifacts/SuwolVisualReference-${VERSION}-mac-arm64.zip"
          sed \
            -e "s/SuwolVisualReference-${VERSION}-darwin-arm64/SuwolVisualReference-${VERSION}-mac-arm64/g" \
            -e "s/SuwolVisualReference-${VERSION}\.zip/SuwolVisualReference-${VERSION}-mac-arm64.zip/g" \
            -e "s/SuwolVisualReference-${VERSION}\.dmg/SuwolVisualReference-${VERSION}-mac-arm64.dmg/g" \
            "$MAC_LATEST" > release-artifacts/latest-mac.yml
          grep -q "SuwolVisualReference-${VERSION}-mac-arm64.zip" release-artifacts/latest-mac.yml

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: release-artifacts/*
          if-no-files-found: error

      - name: Upload macOS diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-diagnostics
          path: diagnostics/**
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install verification dependencies
        run: npm ci --ignore-scripts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: downloaded-artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: downloaded-artifacts/linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: downloaded-artifacts/macos

      - name: Normalize release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          echo "Downloaded artifact files:"
          find downloaded-artifacts -maxdepth 6 -type f -print | sort

          WIN_ZIP="$(find downloaded-artifacts/windows -type f -name '*.zip' | head -n 1)"
          LINUX_ZIP="$(find downloaded-artifacts/linux -type f -name '*.zip' | head -n 1)"
          LINUX_APPIMAGE="$(find downloaded-artifacts/linux -type f -name '*.AppImage' | head -n 1)"
          LINUX_LATEST="$(find downloaded-artifacts/linux -type f -name 'latest-linux.yml' | head -n 1)"
          MAC_DMG="$(find downloaded-artifacts/macos -type f -name '*.dmg' | head -n 1)"
          MAC_ZIP="$(find downloaded-artifacts/macos -type f -name '*.zip' | head -n 1)"
          MAC_LATEST="$(find downloaded-artifacts/macos -type f -name 'latest-mac.yml' | head -n 1)"

          for item in \
            "WIN_ZIP:$WIN_ZIP" \
            "LINUX_ZIP:$LINUX_ZIP" \
            "LINUX_APPIMAGE:$LINUX_APPIMAGE" \
            "LINUX_LATEST:$LINUX_LATEST" \
            "MAC_DMG:$MAC_DMG" \
            "MAC_ZIP:$MAC_ZIP" \
            "MAC_LATEST:$MAC_LATEST"; do
            name="${item%%:*}"
            value="${item#*:}"
            if [ -z "$value" ]; then
              echo "$name not found."
              find downloaded-artifacts -maxdepth 6 -type f -print | sort
              exit 1
            fi
          done

          cp "$WIN_ZIP" "release-assets/SuwolVisualReference-${VERSION}-win-x64.zip"
          cp "$LINUX_ZIP" "release-assets/SuwolVisualReference-${VERSION}-linux-x64.zip"
          cp "$LINUX_APPIMAGE" "release-assets/SuwolVisualReference-${VERSION}-linux-x64.AppImage"
          cp "$LINUX_LATEST" "release-assets/latest-linux.yml"
          cp "$MAC_DMG" "release-assets/SuwolVisualReference-${VERSION}-mac-arm64.dmg"
          cp "$MAC_ZIP" "release-assets/SuwolVisualReference-${VERSION}-mac-arm64.zip"
          cp "$MAC_LATEST" "release-assets/latest-mac.yml"

          echo "Normalized release assets:"
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Verify version and create checksums
        shell: bash
        run: |
          set -euo pipefail
          git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}"
          test -s suwol-release-public-key.asc
          node scripts/checksums.mjs release-assets
          node scripts/verify-checksums.mjs release-assets --require-all
          node scripts/verify-release-assets.mjs release-assets --require-all
          node scripts/verify-release-zip.mjs release-assets --require-all
          cat "release-assets/checksums.txt"

      - name: Import GPG private key
        shell: bash
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          umask 077
          if [ -n "${GPG_PRIVATE_KEY_B64:-}" ]; then
            if ! printf '%s' "$GPG_PRIVATE_KEY_B64" | base64 --decode > "$RUNNER_TEMP/suwol-release-private-key.asc" 2>/tmp/gpg-key-decode.log; then
              printf '%s' "$GPG_PRIVATE_KEY_B64" > "$RUNNER_TEMP/suwol-release-private-key.asc"
            fi
          elif [ -n "${GPG_PRIVATE_KEY:-}" ]; then
            printf '%s' "$GPG_PRIVATE_KEY" > "$RUNNER_TEMP/suwol-release-private-key.asc"
          else
            echo "No GPG private key secret was provided. Set either GPG_PRIVATE_KEY_B64 or GPG_PRIVATE_KEY."
            exit 1
          fi
          gpg --batch --import "$RUNNER_TEMP/suwol-release-private-key.asc"
          rm -f "$RUNNER_TEMP/suwol-release-private-key.asc"

      - name: Sign checksums
        shell: bash
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -n "$GPG_PASSPHRASE"
          cd release-assets
          for checksum_file in checksums.txt "SuwolVisualReference-${VERSION}-checksums.txt"; do
            printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
              --passphrase-fd 0 \
              --armor --detach-sign \
              --output "${checksum_file}.asc" \
              "$checksum_file"
            test -s "${checksum_file}.asc"
          done

      - name: Verify signed checksums
        shell: bash
        env:
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          gpg --import suwol-release-public-key.asc
          gpg --verify release-assets/checksums.txt.asc release-assets/checksums.txt
          gpg --verify "release-assets/SuwolVisualReference-${VERSION}-checksums.txt.asc" "release-assets/SuwolVisualReference-${VERSION}-checksums.txt"
          cd release-assets
          sha256sum -c checksums.txt

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/release-notes/${RELEASE_TAG}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            NOTES_FILE=".github/release-template.md"
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "release-assets/SuwolVisualReference-${VERSION}-win-x64.zip" \
              "release-assets/SuwolVisualReference-${VERSION}-linux-x64.zip" \
              "release-assets/SuwolVisualReference-${VERSION}-linux-x64.AppImage" \
              "release-assets/latest-linux.yml" \
              "release-assets/SuwolVisualReference-${VERSION}-mac-arm64.dmg" \
              "release-assets/SuwolVisualReference-${VERSION}-mac-arm64.zip" \
              "release-assets/latest-mac.yml" \
              "release-assets/checksums.txt" \
              "release-assets/checksums.txt.asc" \
              "release-assets/SuwolVisualReference-${VERSION}-checksums.txt" \
              "release-assets/SuwolVisualReference-${VERSION}-checksums.txt.asc" \
              "suwol-release-public-key.asc" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "release-assets/SuwolVisualReference-${VERSION}-win-x64.zip" \
              "release-assets/SuwolVisualReference-${VERSION}-linux-x64.zip" \
              "release-assets/SuwolVisualReference-${VERSION}-linux-x64.AppImage" \
              "release-assets/latest-linux.yml" \
              "release-assets/SuwolVisualReference-${VERSION}-mac-arm64.dmg" \
              "release-assets/SuwolVisualReference-${VERSION}-mac-arm64.zip" \
              "release-assets/latest-mac.yml" \
              "release-assets/checksums.txt" \
              "release-assets/checksums.txt.asc" \
              "release-assets/SuwolVisualReference-${VERSION}-checksums.txt" \
              "release-assets/SuwolVisualReference-${VERSION}-checksums.txt.asc" \
              "suwol-release-public-key.asc" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$RELEASE_NAME" \
              --notes-file "$NOTES_FILE"
          fi
