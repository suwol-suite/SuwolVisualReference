name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to publish, for example v0.2.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm.cmd -v

      - name: Install dependencies
        run: npm.cmd ci

      - name: Rebuild native dependencies
        run: npm.cmd run rebuild:native

      - name: Validate
        run: |
          npm.cmd run icons:generate
          npm.cmd run typecheck
          npm.cmd run lint
          npm.cmd run test:selection
          npm.cmd run test:updates
          npm.cmd run i18n:check
          npm.cmd run license:check
          npm.cmd run smoke

      - name: Build release ZIP
        run: npm.cmd run release:zip:win

      - name: Verify packaged app
        run: npm.cmd run verify:packaged-app -- --platform=win

      - name: List release files
        run: Get-ChildItem -Path release -Recurse | Select-Object FullName, Length

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: release/SuwolVisualReference-*-win-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install Electron smoke-test display helper
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npm run rebuild:native

      - name: Validate
        run: |
          npm run icons:generate
          npm run typecheck
          npm run lint
          npm run test:selection
          npm run test:updates
          npm run i18n:check
          npm run license:check
          xvfb-run -a npm run smoke:ci:linux

      - name: Build Linux release artifacts
        run: npm run dist:linux:release

      - name: Normalize Linux AppImage metadata
        run: npm run release:normalize-linux-appimage -- --require

      - name: Verify packaged app
        run: npm run verify:packaged-app -- --platform=linux

      - name: List release files
        run: find release -maxdepth 2 -type f -print

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            release/SuwolVisualReference-*-linux-x64.AppImage
            release/latest-linux.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install verification dependencies
        run: npm ci --ignore-scripts

      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-assets

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-assets

      - name: Verify version and create checksums
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}"
          test -s suwol-release-public-key.asc
          find release-assets -maxdepth 1 -type f -print
          node scripts/checksums.mjs release-assets
          node scripts/verify-checksums.mjs release-assets --require-all
          node scripts/verify-release-assets.mjs release-assets --require-all
          node scripts/verify-release-zip.mjs release-assets --require-all
          cat "release-assets/checksums.txt"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Import GPG private key
        run: |
          set -euo pipefail
          umask 077
          if [ -n "${GPG_PRIVATE_KEY_B64:-}" ]; then
            if ! printf '%s' "$GPG_PRIVATE_KEY_B64" | base64 --decode > private.asc 2>/tmp/gpg-key-decode.log; then
              printf '%s' "$GPG_PRIVATE_KEY_B64" > private.asc
            fi
          elif [ -n "${GPG_PRIVATE_KEY:-}" ]; then
            printf '%s' "$GPG_PRIVATE_KEY" > private.asc
          else
            echo "GPG_PRIVATE_KEY_B64 or GPG_PRIVATE_KEY secret is missing."
            exit 1
          fi
          gpg --batch --import private.asc
          rm -f private.asc
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign checksums
        run: |
          set -euo pipefail
          test -n "$GPG_PASSPHRASE"
          cd release-assets
          for checksum_file in checksums.txt "SuwolVisualReference-${VERSION}-checksums.txt"; do
            printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
              --passphrase-fd 0 \
              --armor --detach-sign \
              --output "${checksum_file}.asc" \
              "$checksum_file"
            test -s "${checksum_file}.asc"
          done
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify signed checksums
        run: |
          set -euo pipefail
          gpg --import suwol-release-public-key.asc
          gpg --verify release-assets/checksums.txt.asc release-assets/checksums.txt
          gpg --verify "release-assets/SuwolVisualReference-${VERSION}-checksums.txt.asc" "release-assets/SuwolVisualReference-${VERSION}-checksums.txt"
          cd release-assets
          sha256sum -c checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/release-notes/${RELEASE_TAG}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            NOTES_FILE=".github/release-template.md"
          fi
          gh release create "$RELEASE_TAG" \
            "release-assets/SuwolVisualReference-${VERSION}-win-x64.zip" \
            "release-assets/SuwolVisualReference-${VERSION}-linux-x64.AppImage" \
            "release-assets/latest-linux.yml" \
            "release-assets/checksums.txt" \
            "release-assets/checksums.txt.asc" \
            "release-assets/SuwolVisualReference-${VERSION}-checksums.txt" \
            "release-assets/SuwolVisualReference-${VERSION}-checksums.txt.asc" \
            "suwol-release-public-key.asc" \
            --verify-tag \
            --title "Suwol Visual Reference ${RELEASE_TAG}" \
            --notes-file "$NOTES_FILE"
