name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-ci:
    name: Windows CI
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm.cmd -v

      - name: Install dependencies
        run: npm.cmd ci

      - name: Rebuild native dependencies
        run: npm.cmd run rebuild:native

      - name: Validate
        run: |
          npm.cmd run icons:generate
          npm.cmd run typecheck
          npm.cmd run lint
          npm.cmd run test:selection
          npm.cmd run i18n:check
          npm.cmd run license:check
          npm.cmd run smoke
          npm.cmd run build
          npm.cmd audit --omit=dev

  linux-ci:
    name: Linux CI
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install Electron smoke-test display helper
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npm run rebuild:native

      - name: Validate
        run: |
          npm run icons:generate
          npm run typecheck
          npm run lint
          npm run test:selection
          npm run i18n:check
          npm run license:check
          xvfb-run -a npm run smoke:ci:linux
          npm run build
          npm audit --omit=dev
